<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Quản lý học viên</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBDRJYpzNZrVxUtWHCOk7H17eOWbNKggCY",
  authDomain: "js-playwright-cms-7b5b9.firebaseapp.com",
  projectId: "js-playwright-cms-7b5b9",
  storageBucket: "js-playwright-cms-7b5b9.firebasestorage.app",
  messagingSenderId: "195440512201",
  appId: "1:195440512201:web:86cff497872f64ea185118"
});
var db = firebase.firestore();
</script>
<style>
:root { --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --text: #f1f5f9; --text2: #94a3b8; --border: #475569; --primary: #6366f1; --green: #22c55e; --yellow: #eab308; --red: #ef4444; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.header { background: linear-gradient(135deg, var(--primary), #8b5cf6); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; color: #fff; }
.header .refresh { padding: 8px 16px; border: 1px solid rgba(255,255,255,.3); border-radius: 8px; background: transparent; color: #fff; cursor: pointer; font-size: 13px; }
.header .refresh:hover { background: rgba(255,255,255,.1); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 24px 32px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.stat-card .num { font-size: 32px; font-weight: 800; }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stat-card.green .num { color: var(--green); }
.stat-card.yellow .num { color: var(--yellow); }
.stat-card.primary .num { color: var(--primary); }
.stat-card.red .num { color: var(--red); }
.section { padding: 0 32px 24px; }
.section h2 { font-size: 16px; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
th, td { padding: 12px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
th { background: var(--bg3); font-weight: 700; color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
tr:hover { background: rgba(99,102,241,.05); }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-green { background: rgba(34,197,94,.15); color: var(--green); }
.badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-primary { background: rgba(99,102,241,.15); color: var(--primary); }
.progress-bar { width: 100px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
.progress-bar .fill { height: 100%; border-radius: 3px; background: var(--primary); }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #8b5cf6); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; margin-right: 8px; vertical-align: middle; }
.time-ago { color: var(--text2); font-size: 12px; }
.activity-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 13px; }
.activity-item:last-child { border-bottom: none; }
.activity-item .act-icon { font-size: 18px; }
.activity-item .act-user { font-weight: 700; color: var(--primary); }
.activity-item .act-time { margin-left: auto; font-size: 11px; color: var(--text2); }
.loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
.empty { text-align: center; padding: 40px; color: var(--text2); }
@media (max-width: 768px) { .stats { grid-template-columns: 1fr 1fr; } .section { padding: 0 16px 16px; } .header { padding: 16px; } }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Admin Dashboard — Quản lý học viên</h1>
  <button class="refresh" onclick="loadData()">🔄 Làm mới</button>
</div>

<div class="stats" id="statsGrid">
  <div class="stat-card green"><div class="num" id="statTotal">-</div><div class="label">Tổng học viên</div></div>
  <div class="stat-card primary"><div class="num" id="statActive">-</div><div class="label">Active hôm nay</div></div>
  <div class="stat-card yellow"><div class="num" id="statAvgXp">-</div><div class="label">XP trung bình</div></div>
  <div class="stat-card red"><div class="num" id="statCompleted">-</div><div class="label">Hoàn thành 100%</div></div>
</div>

<div class="section">
  <h2>👥 Danh sách học viên</h2>
  <table>
    <thead>
      <tr>
        <th>Học viên</th>
        <th>Level</th>
        <th>XP</th>
        <th>Tiến độ</th>
        <th>Streak</th>
        <th>Thiết bị</th>
        <th>Hoạt động cuối</th>
      </tr>
    </thead>
    <tbody id="usersTable">
      <tr><td colspan="7" class="loading">Đang tải...</td></tr>
    </tbody>
  </table>
</div>

<div class="section">
  <h2>📋 Hoạt động gần đây</h2>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;max-height:500px;overflow-y:auto;" id="activityList">
    <div class="loading">Đang tải...</div>
  </div>
</div>

<script>
var MODULES = ['Giới thiệu','Biến & Kiểu dữ liệu','Điều kiện & Vòng lặp','Hàm','Array & Object','Async/Await','Class/OOP & HTML','Playwright','Locator & Actions','Assertions','POM','API Testing','Config & Capstone'];

function timeAgo(dateStr) {
  if (!dateStr) return 'Chưa rõ';
  var d = new Date(dateStr);
  var now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'Vừa xong';
  if (diff < 3600) return Math.floor(diff/60) + ' phút trước';
  if (diff < 86400) return Math.floor(diff/3600) + ' giờ trước';
  if (diff < 604800) return Math.floor(diff/86400) + ' ngày trước';
  return d.toLocaleDateString('vi-VN');
}

function actionIcon(action) {
  if (action === 'view_module') return '👁️';
  if (action === 'complete_module') return '✅';
  if (action === 'uncomplete_module') return '↩️';
  if (action === 'run_playground') return '▶️';
  if (action === 'submit_exam') return '📝';
  return '📌';
}

function actionText(action) {
  if (action === 'view_module') return 'xem';
  if (action === 'complete_module') return 'hoàn thành';
  if (action === 'uncomplete_module') return 'bỏ hoàn thành';
  if (action === 'run_playground') return 'chạy code';
  if (action === 'submit_exam') return 'nộp bài kiểm tra';
  return action;
}

function loadData() {
  // Load users
  db.collection('users').orderBy('lastActive', 'desc').get().then(function(snap) {
    var users = [];
    snap.forEach(function(doc) { users.push(doc.data()); });

    // Stats
    var today = new Date().toISOString().split('T')[0];
    var activeToday = users.filter(function(u) { return u.lastActive && u.lastActive.startsWith(today); }).length;
    var avgXp = users.length ? Math.round(users.reduce(function(s,u){return s+(u.xp||0)},0)/users.length) : 0;
    var completed100 = users.filter(function(u) { return u.modulesCompleted >= 13; }).length;

    document.getElementById('statTotal').textContent = users.length;
    document.getElementById('statActive').textContent = activeToday;
    document.getElementById('statAvgXp').textContent = avgXp;
    document.getElementById('statCompleted').textContent = completed100;

    // Users table
    if (users.length === 0) {
      document.getElementById('usersTable').innerHTML = '<tr><td colspan="7" class="empty">Chưa có học viên nào</td></tr>';
      return;
    }

    document.getElementById('usersTable').innerHTML = users.map(function(u) {
      var pct = Math.round((u.modulesCompleted || 0) / (u.totalModules || 13) * 100);
      var levelBadge = 'badge-primary';
      if ((u.xp||0) >= 500) levelBadge = 'badge-green';
      else if ((u.xp||0) >= 150) levelBadge = 'badge-yellow';

      return '<tr>' +
        '<td><span class="avatar">' + (u.name||'?').charAt(0).toUpperCase() + '</span><strong>' + (u.name||'Ẩn danh') + '</strong></td>' +
        '<td><span class="badge ' + levelBadge + '">' + (u.level || 'Newbie') + '</span></td>' +
        '<td><strong>' + (u.xp || 0) + '</strong></td>' +
        '<td><div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div>' + pct + '% (' + (u.modulesCompleted||0) + '/' + (u.totalModules||13) + ')</td>' +
        '<td>' + (u.streak > 0 ? '🔥 ' + u.streak + ' ngày' : '-') + '</td>' +
        '<td>' + (u.device || '-') + '</td>' +
        '<td class="time-ago">' + timeAgo(u.lastActive) + '</td>' +
        '</tr>';
    }).join('');
  }).catch(function(e) {
    document.getElementById('usersTable').innerHTML = '<tr><td colspan="7" class="empty">Lỗi: ' + e.message + '</td></tr>';
  });

  // Load activities
  db.collection('activities').orderBy('timestamp', 'desc').limit(50).get().then(function(snap) {
    var acts = [];
    snap.forEach(function(doc) { acts.push(doc.data()); });

    if (acts.length === 0) {
      document.getElementById('activityList').innerHTML = '<div class="empty">Chưa có hoạt động</div>';
      return;
    }

    document.getElementById('activityList').innerHTML = acts.map(function(a) {
      var ts = a.timestamp ? a.timestamp.toDate().toISOString() : '';
      return '<div class="activity-item">' +
        '<span class="act-icon">' + actionIcon(a.action) + '</span>' +
        '<span><span class="act-user">' + (a.userName || 'Ẩn danh') + '</span> ' + actionText(a.action) + ' <strong>' + (a.details || '') + '</strong></span>' +
        '<span class="act-time">' + timeAgo(ts) + '</span>' +
        '</div>';
    }).join('');
  }).catch(function(e) {
    document.getElementById('activityList').innerHTML = '<div class="empty">Lỗi: ' + e.message + '</div>';
  });
}

// Auto refresh every 30 seconds
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
